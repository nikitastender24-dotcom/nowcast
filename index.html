<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Радарная карта</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body, #map { width:100%; height:100%; font-family: sans-serif; }
        body { overflow:hidden; }
        .radar-control {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1000;
            background: rgba(255,255,255,0.9);
            padding: 10px;
            border-radius: 6px;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
            font-size: 14px;
        }
        .radar-control select {
            padding: 5px;
            font-size: 14px;
            width: 220px;
        }
        .leaflet-image-layer { image-rendering: pixelated; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="radar-control">
        <label for="radarSelect">Радар:</label>
        <select id="radarSelect">
            <option value="all">Все радары</option>
        </select>
    </div>

<script>
    // ---------- Словарь названий явлений по strength ----------
    const PHENOMENA_NAMES = {
        1: "Обл. Сред. Яруса",
        2: "Сл. Образования",
        3: "Осадки слабые",
        4: "Осадки умеренные",
        5: "Осадки сильные",
        6: "Кучевая обл.",
        7: "Ливень слабый",
        8: "Ливень умеренный",
        9: "Ливень сильный",
        10: "Гроза (R)",
        11: "Гроза R",
        12: "Гроза R+",
        13: "Град слабый",
        14: "Град умеренный",
        15: "Град сильный",
        16: "Шквал слабый",
        17: "Шквал умеренный",
        18: "Шквал сильный"
    };

    // ---------- Список радаров ----------
    const radarList = [
        { stringId: "RUDT", name: "Ставрополь" },
        { stringId: "RAVO", name: "Воейково" },
        { stringId: "RUDN", name: "Нижний Новгород" },
        { stringId: "RAVN", name: "Москва (Внуково)" },
        { stringId: "RUDG", name: "Волгоград" },
        { stringId: "RUDL", name: "Смоленск" },
        { stringId: "RUDM", name: "Минеральные Воды" },
        { stringId: "RUDZ", name: "Казань" },
        { stringId: "RUDV", name: "Вологда" },
        { stringId: "RUDI", name: "Ижевск" },
        { stringId: "RUSP", name: "Санкт-Петербург (Пулково)" },
        { stringId: "RUDX", name: "Архангельск" },
        { stringId: "UMMN", name: "Минск" },
        { stringId: "RUWJ", name: "Валдай" },
        { stringId: "RUEK", name: "Екатеринбург" },
        { stringId: "RUDP", name: "Петрозаводск" },
        { stringId: "UMBB", name: "Брест" },
        { stringId: "RUDU", name: "Уфа" },
        { stringId: "RAKD", name: "RAKD" },
        { stringId: "RASM", name: "Самара (Безенчук)" },
        { stringId: "RAMI", name: "Миллерово" }
    ];

    // Центры для окружностей зон видимости (250 км)
    const radarCenters = {
        RUDT: [45.114, 42.103],
        RAVO: [59.966, 30.700],
        RUDN: [56.2938, 43.9788],
        RAVN: [55.584, 37.249],
        RUDG: [48.79, 44.33],
        RUDL: [54.84, 32.00],
        RUDM: [44.2089, 43.1075],
        RUDZ: [55.58, 49.27],
        RUDV: [59.284, 39.925],
        RUDI: [56.837, 53.456],
        RUSP: [59.80, 30.263],
        RUDX: [64.624, 40.509],
        UMMN: [53.883, 28.031],
        RUWJ: [57.9528, 33.2783],
        RUEK: [56.752, 60.795],
        RUDP: [61.82, 34.25],
        UMBB: [52.115, 23.914],
        RUDU: [54.565, 55.888],
        RAKD: [45.0338, 39.1392],
        RASM: [52.97, 49.43],
        RAMI: [48.937, 40.412]
    };

    // Заполняем выпадающий список
    const select = document.getElementById('radarSelect');
    radarList.forEach(r => {
        const opt = document.createElement('option');
        opt.value = r.stringId;
        opt.textContent = r.name + ' (' + r.stringId + ')';
        select.appendChild(opt);
    });

    // Инициализация карты
    const map = L.map('map').setView([55.0, 40.0], 5);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    map.createPane('radarPane').style.zIndex = 450;
    let currentOverlay = null;
    let circleLayer = L.layerGroup().addTo(map);

    // Обновление радарного тайла и окружностей
    async function updateRadar() {
        const radar = select.value;
        const bounds = map.getBounds();
        const size = map.getSize();
        const bbox = `${bounds.getWest()},${bounds.getSouth()},${bounds.getEast()},${bounds.getNorth()}`;
        const url = `get_tile.png?bbox=${bbox}&width=${size.x}&height=${size.y}&radar=${radar}`;

        if (currentOverlay) map.removeLayer(currentOverlay);
        currentOverlay = L.imageOverlay(url, bounds, {
            opacity: 1.0,
            interactive: false,
            pane: 'radarPane'
        }).addTo(map);

        circleLayer.clearLayers();
        if (radar === 'all') {
            for (let [id, center] of Object.entries(radarCenters)) {
                L.circle(center, {
                    radius: 250000,
                    color: '#000',
                    opacity: 0.6,
                    weight: 1,
                    fillOpacity: 0,
                    interactive: false
                }).addTo(circleLayer);
            }
        } else {
            const center = radarCenters[radar];
            if (center) {
                L.circle(center, {
                    radius: 250000,
                    color: '#000',
                    opacity: 0.8,
                    weight: 2,
                    fillOpacity: 0,
                    interactive: false
                }).addTo(circleLayer);
            }
        }
    }

    // Клик по карте — запрос ближайшего явления и простой popup
    map.on('click', async function(e) {
        const lat = e.latlng.lat.toFixed(5);
        const lon = e.latlng.lng.toFixed(5);
        const radar = select.value;

        try {
            const resp = await fetch(`get_point_info?lat=${lat}&lon=${lon}&radar=${radar}`);
            if (!resp.ok) throw new Error('Ошибка сервера');
            const data = await resp.json();

            if (data.length > 0) {
                const p = data[0]; // ближайшее явление
                const phenomenon = PHENOMENA_NAMES[p.strength] || `Сила ${p.strength}`;
                const content = `<b>Радар:</b> ${p.stringId}<br><b>Явление:</b> ${phenomenon}`;
                L.popup()
                    .setLatLng(e.latlng)
                    .setContent(content)
                    .openOn(map);
            } else {
                L.popup()
                    .setLatLng(e.latlng)
                    .setContent('Явлений не найдено')
                    .openOn(map);
            }
        } catch (err) {
            console.error(err);
            L.popup()
                .setLatLng(e.latlng)
                .setContent('Ошибка запроса')
                .openOn(map);
        }
    });

    // Привязка событий
    select.addEventListener('change', updateRadar);
    map.on('moveend zoomend', updateRadar);
    updateRadar();
</script>
</body>
</html>
